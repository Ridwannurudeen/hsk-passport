<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="HSK Passport — the default compliance layer for HashKey Chain">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0b0d"/>
      <stop offset="100%" stop-color="#101217"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3a6cff"/>
      <stop offset="50%" stop-color="#4f7cff"/>
      <stop offset="100%" stop-color="#7a9bff"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f7cff"/>
      <stop offset="60%" stop-color="#8fb2ff"/>
      <stop offset="100%" stop-color="#4f7cff"/>
    </linearGradient>
    <linearGradient id="hili" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.18" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="rgba(79, 124, 255, 0.35)"/>
      <stop offset="100%" stop-color="rgba(79, 124, 255, 0)"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="14"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Ambient brand glow -->
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- Subtle grid -->
  <g opacity="0.06" stroke="#ffffff" stroke-width="1">
    <path d="M0 80 H1200 M0 160 H1200 M0 240 H1200 M0 320 H1200 M0 400 H1200 M0 480 H1200 M0 560 H1200"/>
    <path d="M80 0 V630 M160 0 V630 M240 0 V630 M320 0 V630 M400 0 V630 M480 0 V630 M560 0 V630 M640 0 V630 M720 0 V630 M800 0 V630 M880 0 V630 M960 0 V630 M1040 0 V630 M1120 0 V630"/>
  </g>

  <!-- Logomark tile -->
  <g transform="translate(80, 200)" filter="url(#shadow)">
    <rect width="230" height="230" rx="56" fill="url(#brand)"/>
    <rect width="230" height="230" rx="56" fill="url(#hili)"/>
    <rect x="0.5" y="0.5" width="229" height="229" rx="56" fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
    <!-- Glyph -->
    <g stroke="#ffffff" stroke-width="16" stroke-linecap="round" stroke-linejoin="round" fill="none" transform="translate(0,0) scale(0.225)">
      <path d="M 280 280 V 744"/>
      <path d="M 480 280 V 744"/>
      <path d="M 680 280 V 744"/>
      <path d="M 280 512 H 600"/>
    </g>
    <circle cx="175" cy="70" r="11" fill="#ffffff"/>
    <circle cx="175" cy="70" r="5.5" fill="#4f7cff"/>
  </g>

  <!-- Wordmark + tagline -->
  <g transform="translate(355, 230)">
    <text x="0" y="0" fill="#f5f7fa" font-family="-apple-system, 'SF Pro Display', 'Inter', system-ui, sans-serif" font-weight="700" font-size="84" letter-spacing="-3">
      HSK Passport
    </text>
    <text x="0" y="76" fill="url(#text-grad)" font-family="-apple-system, 'SF Pro Display', 'Inter', system-ui, sans-serif" font-weight="600" font-size="36" letter-spacing="-1">
      The default compliance layer
    </text>
    <text x="0" y="124" fill="#a7afbc" font-family="-apple-system, 'SF Pro Display', 'Inter', system-ui, sans-serif" font-weight="400" font-size="28" letter-spacing="-0.5">
      for regulated apps on HashKey Chain.
    </text>
  </g>

  <!-- Bottom meta strip -->
  <g transform="translate(80, 530)" font-family="ui-monospace, 'JetBrains Mono', 'SF Mono', monospace" font-size="14" letter-spacing="2" fill="#6c7380">
    <text x="0" y="0">ZK · SUMSUB · COMPOSER · TIMELOCK · 11 CONTRACTS · 45 TESTS · v5 LIVE</text>
  </g>

  <!-- Top-right testnet indicator -->
  <g transform="translate(1080, 60)">
    <circle cx="0" cy="0" r="4" fill="#22c25e">
      <animate attributeName="opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="14" y="5" font-family="ui-monospace, 'JetBrains Mono', monospace" font-size="12" letter-spacing="2" fill="#a7afbc">TESTNET LIVE</text>
  </g>

  <!-- ZKID track tag bottom-right -->
  <g transform="translate(1010, 580)">
    <rect x="0" y="-22" width="115" height="32" rx="16" fill="rgba(79, 124, 255, 0.12)" stroke="rgba(79, 124, 255, 0.4)"/>
    <text x="57.5" y="-2" font-family="-apple-system, 'Inter', system-ui, sans-serif" font-weight="600" font-size="13" letter-spacing="0.5" fill="#8fb2ff" text-anchor="middle">ZKID TRACK</text>
  </g>
</svg>
