<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-label="HSK Passport logomark">
  <defs>
    <!-- Brand gradient: same blue as the website's accent + a slightly lighter highlight -->
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3a6cff"/>
      <stop offset="50%" stop-color="#4f7cff"/>
      <stop offset="100%" stop-color="#7a9bff"/>
    </linearGradient>

    <!-- Inner highlight to make the tile feel three-dimensional -->
    <linearGradient id="highlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.20"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- Soft drop shadow for depth -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="22"/>
      <feOffset dx="0" dy="20"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Subtle dark frame so the tile stands on any background -->
  <rect width="1024" height="1024" rx="240" fill="#0a0b0d" opacity="0"/>

  <!-- Main rounded tile -->
  <g filter="url(#shadow)">
    <rect x="64" y="64" width="896" height="896" rx="200" fill="url(#brand)"/>
    <!-- Subtle inset highlight along the top -->
    <rect x="64" y="64" width="896" height="896" rx="200" fill="url(#highlight)"/>
    <!-- Inner stroke for a clean edge -->
    <rect x="64.5" y="64.5" width="895" height="895" rx="200"
          fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="1"/>
  </g>

  <!-- Glyph: stylised passport bars + verification check
       Reads as both "passport" (vertical bars) and "credential issued" (the dot dot
       check pattern). White on the brand gradient. -->
  <g stroke="#ffffff" stroke-width="68" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- Three vertical strokes — the passport pages / record bars -->
    <path d="M 280 280 V 744"/>
    <path d="M 480 280 V 744"/>
    <path d="M 680 280 V 744"/>
    <!-- Connecting horizontal — the binding spine + verification stroke -->
    <path d="M 280 512 H 600"/>
  </g>

  <!-- Small accent dot — credential issued indicator, top-right of the glyph -->
  <circle cx="780" cy="312" r="44" fill="#ffffff"/>
  <circle cx="780" cy="312" r="22" fill="url(#brand)"/>
</svg>
